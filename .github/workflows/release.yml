name: Build Release

on:
  repository_dispatch:
    types: [build-release]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: Choochmeque/PlanLyst
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          ref: ${{ github.event.client_payload.tag }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-linux-android

      - name: Cache and install APT packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf cmake
          version: "1.0"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Cache Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install frontend dependencies
        run: pnpm install

      - name: Setup Android environment
        run: ./scripts/setup_android_env.sh ${ANDROID_SDK_ROOT}

      - name: Create .env file
        run: |
          echo "${{ secrets.DOT_ENV }}" > src-tauri/.env
          echo "${{ secrets.ROOT_DOT_ENV }}" > .env

      - name: Create keystore.properties
        run: echo "${{ secrets.KEYSTORE_PROPERTIES }}" > src-tauri/gen/android/keystore.properties

      - name: Build Android Release
        env:
          RUSTFLAGS: "-C link-arg=-Wl,-z,max-page-size=16384"
        run: pnpm tauri android build --aab true --target aarch64

      - name: Upload AAB
        uses: italankin/google-play-aab-uploader@1.3
        with:
          package-name: 'com.aurelen.planlyst'
          aab-path: 'src-tauri/gen/android/app/build/outputs/bundle/universalRelease/app-universal-release.aab'
          key-json: '${{ secrets.SERVICE_KEY_JSON }}'

  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: Choochmeque/PlanLyst
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          ref: ${{ github.event.client_payload.tag }}

      - name: Import code signing certificate
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Install provisioning profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-apple-ios

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Cache Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install frontend dependencies
        run: pnpm install

      - name: Create .env file
        run: |
          echo "${{ secrets.DOT_ENV }}" > src-tauri/.env
          echo "${{ secrets.ROOT_DOT_ENV }}" > .env

      - name: Build iOS Release
        run: pnpm tauri ios build --export-method app-store-connect

      - name: Prepare App Store Connect API key
        run: |
          mkdir -p ./private_keys
          echo "${{ secrets.APPLE_API_PRIVATE_KEY }}" > ./private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8
          chmod 600 ./private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8

      - name: Validate IPA
        run: xcrun altool --validate-app -t ios -f "src-tauri/gen/apple/build/arm64/PlanLyst.ipa" --apiKey ${{ secrets.APPLE_API_KEY_ID }} --apiIssuer ${{ secrets.APPLE_API_ISSUER }}

      - name: Upload IPA
        run: xcrun altool --upload-app -t ios -f "src-tauri/gen/apple/build/arm64/PlanLyst.ipa" --apiKey ${{ secrets.APPLE_API_KEY_ID }} --apiIssuer ${{ secrets.APPLE_API_ISSUER }}

  build-windows:
    runs-on: windows-latest
    if: false  # Disabled

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: Choochmeque/PlanLyst
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          ref: ${{ github.event.client_payload.tag }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install frontend dependencies
        run: pnpm install

      - name: Create .env file
        run: |
          Set-Content -Path "src-tauri/.env" -Value $env:DOT_ENV
          Set-Content -Path ".env" -Value $env:ROOT_DOT_ENV
        env:
          DOT_ENV: ${{ secrets.DOT_ENV }}
          ROOT_DOT_ENV: ${{ secrets.ROOT_DOT_ENV }}

      - name: Build Windows MSIX Bundle (x64 + ARM64)
        run: pnpm tauri:windows:build --arch x64,arm64

      - name: Configure Microsoft Store CLI
        uses: microsoft/microsoft-store-apppublisher@v1.1

      - name: Reconfigure store credentials
        run: msstore reconfigure `
              --tenantId ${{ secrets.AZURE_AD_TENANT_ID }} `
              --sellerId ${{ secrets.SELLER_ID }} `
              --clientId ${{ secrets.AZURE_AD_APPLICATION_CLIENT_ID }} `
              --clientSecret ${{ secrets.AZURE_AD_APPLICATION_SECRET }}

      - name: Publish to Microsoft Store
        run: msstore publish '${{ github.workspace }}/target/msix/' -id ${{ secrets.MS_STORE_PRODUCT_ID }}

  build-macos:
    runs-on: macos-latest
    if: false  # Disabled

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: Choochmeque/PlanLyst
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          ref: ${{ github.event.client_payload.tag }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install frontend dependencies
        run: pnpm install

      - name: Create .env file
        run: |
          echo "${{ secrets.DOT_ENV }}" > src-tauri/.env
          echo "${{ secrets.ROOT_DOT_ENV }}" > .env

      - name: Build macOS Release
        run: pnpm tauri build --bundles app --target aarch64-apple-darwin
