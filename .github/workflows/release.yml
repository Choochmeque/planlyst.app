name: Build Release

on:
  repository_dispatch:
    types: [build-release]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v6
        with:
          repository: Choochmeque/PlanLyst
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          ref: ${{ github.event.client_payload.tag }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-linux-android

      - name: Cache and install APT packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf cmake
          version: "1.0"

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Cache Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Android environment
        run: ./scripts/setup_android_env.sh ${ANDROID_SDK_ROOT}

      - name: Create .env file
        run: |
          echo "${{ secrets.DOT_ENV }}" > src-tauri/.env
          echo "${{ secrets.ROOT_DOT_ENV }}" > .env

      - name: Create keystore.properties
        run: echo "${{ secrets.KEYSTORE_PROPERTIES }}" > src-tauri/gen/android/keystore.properties

      - name: Build Android Release
        env:
          # --build-id makes the .so carry a GNU build-id note; without it
          # sentry-cli can't derive a Debug ID from the extracted .dbg and
          # reports "0 debug information files" on upload.
          RUSTFLAGS: "-C link-arg=-Wl,-z,max-page-size=16384 -C link-arg=-Wl,--build-id"
          # Emit line-tables DWARF so ExtractDebugSymbolsTask packs real Rust
          # symbols into native-debug-symbols.zip (uploaded to Play Console
          # and consumed by Sentry). The same Gradle task also strips the .so
          # in-place after extracting, so the AAB ships a slim binary —
          # AGP's stripDebugSymbols is a no-op on this prebuilt.
          CARGO_PROFILE_RELEASE_DEBUG: line-tables-only
        run: pnpm tauri android build --aab --target aarch64

      - name: Upload AAB + native debug symbols
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_KEY_JSON }}
          packageName: com.aurelen.planlyst
          releaseFiles: src-tauri/gen/android/app/build/outputs/bundle/universalRelease/app-universal-release.aab
          debugSymbols: src-tauri/gen/android/app/build/outputs/native-debug-symbols/release/native-debug-symbols.zip
          mappingFile: src-tauri/gen/android/app/build/outputs/mapping/universalRelease/mapping.txt
          releaseName: ${{ github.event.client_payload.tag }}
          # Matches the prior italankin action's default. Change to
          # production/alpha/beta if your release flow uses a different lane.
          # Comma-separate to publish to multiple tracks at once.
          tracks: internal

      - name: Install sentry-cli
        run: curl -sL https://sentry.io/get-cli/ | sh

      - name: Upload Android debug symbols to Sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: sentry-cli debug-files upload src-tauri/gen/android/app/build/outputs/native-debug-symbols/release/native-debug-symbols.zip

  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v6
        with:
          repository: Choochmeque/PlanLyst
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          ref: ${{ github.event.client_payload.tag }}

      - name: Select Xcode 26.2
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.2"

      - name: Remove MetalToolchain (Tauri + Xcode 26 fix)
        run: |
          # Confirmed by Darkatse in tauri-apps/tauri#15066: MetalToolchain 26.x
          # dropped libswiftCompatibility 5.x but its dirs still get baked into
          # xcodebuild's -L search paths, hiding the working copies in
          # XcodeDefault.xctoolchain. Removing the component clears the bogus
          # paths and the link succeeds. -deleteComponent only works on
          # downloaded assets, so download first. Apple's asset catalog is
          # flaky for some build IDs, so retry the download a few times before
          # giving up; if it persistently fails, continue — the asset may
          # already be cached from a prior run.
          for i in 1 2 3; do
            sudo xcodebuild -downloadComponent MetalToolchain && break
            echo "Attempt $i failed; sleeping 15s and retrying"
            sleep 15
          done || echo "MetalToolchain catalog fetch still failing; continuing in case the asset is already on disk"
          sudo xcodebuild -deleteComponent MetalToolchain

      - name: Import code signing certificate
        uses: apple-actions/import-codesign-certs@v7
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Download provisioning profile
        id: download_profile
        uses: apple-actions/download-provisioning-profiles@v6
        with:
          bundle-id: com.aurelen.planlyst
          profile-type: IOS_APP_STORE
          issuer-id: ${{ secrets.APPLE_API_ISSUER }}
          api-key-id: ${{ secrets.APPLE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPLE_API_PRIVATE_KEY }}

      - name: Switch iOS target to manual signing
        run: |
          # The action downloads every App Store profile attached to the team,
          # including invisible Xcode-managed ones spawned by past automatic-
          # signing builds. Manual signing rejects those, so skip any whose
          # Name starts with "iOS Team" (the Apple-managed prefix) and pick the
          # first manually-managed profile.
          PROFILE_NAME=""
          PROFILE_PATH=""
          for f in "$HOME/Library/MobileDevice/Provisioning Profiles/"*.mobileprovision; do
            name=$(security cms -D -i "$f" | plutil -extract Name raw -o - -)
            case "$name" in
              "iOS Team "*) continue ;;
            esac
            PROFILE_NAME="$name"
            PROFILE_PATH="$f"
            break
          done

          if [ -z "$PROFILE_NAME" ]; then
            echo "::error::No manually-managed App Store profile found. Only Xcode-managed profiles available."
            exit 1
          fi

          TEAM_ID=$(security cms -D -i "$PROFILE_PATH" | plutil -extract TeamIdentifier.0 raw -o - -)

          gem install --no-document xcodeproj

          PROFILE_NAME="$PROFILE_NAME" TEAM_ID="$TEAM_ID" ruby <<'RUBY'
          require 'xcodeproj'
          proj = Xcodeproj::Project.open('src-tauri/gen/apple/PlanLyst.xcodeproj')
          target = proj.targets.find { |t| t.name == 'PlanLyst_iOS' }
          raise 'PlanLyst_iOS target not found' unless target
          target.build_configurations.each do |c|
            c.build_settings.merge!(
              'CODE_SIGN_STYLE' => 'Manual',
              'CODE_SIGN_IDENTITY' => 'Apple Distribution',
              'PROVISIONING_PROFILE_SPECIFIER' => ENV.fetch('PROFILE_NAME'),
              'DEVELOPMENT_TEAM' => ENV.fetch('TEAM_ID'),
            )
          end
          proj.save
          puts "Applied manual signing: team=#{ENV['TEAM_ID']} profile=#{ENV['PROFILE_NAME']}"
          RUBY

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-apple-ios

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Cache Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Create .env file
        run: |
          echo "${{ secrets.DOT_ENV }}" > src-tauri/.env
          echo "${{ secrets.ROOT_DOT_ENV }}" > .env

      - name: Prepare App Store Connect API key
        run: |
          mkdir -p ~/.appstoreconnect/private_keys ./private_keys
          echo "${{ secrets.APPLE_API_PRIVATE_KEY }}" > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8
          cp ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8 ./private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8

      - name: Build iOS Release
        env:
          # Emit line-tables DWARF so the resulting dSYM/.symbols carry full
          # file:line info for Rust frames. Xcode's archive pipeline strips
          # DWARF from the shipped binary after dsymutil extracts it, so the
          # user-downloaded .ipa size is unchanged.
          CARGO_PROFILE_RELEASE_DEBUG: line-tables-only
        run: pnpm tauri ios build --export-method app-store-connect

      - name: Validate IPA
        run: xcrun altool --validate-app -t ios -f "src-tauri/gen/apple/build/arm64/PlanLyst.ipa" --apiKey ${{ secrets.APPLE_API_KEY_ID }} --apiIssuer ${{ secrets.APPLE_API_ISSUER }}

      - name: Upload IPA
        run: xcrun altool --upload-app -t ios -f "src-tauri/gen/apple/build/arm64/PlanLyst.ipa" --apiKey ${{ secrets.APPLE_API_KEY_ID }} --apiIssuer ${{ secrets.APPLE_API_ISSUER }}

      - name: Install sentry-cli
        run: curl -sL https://sentry.io/get-cli/ | sh

      - name: Upload iOS dSYMs to Sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: sentry-cli debug-files upload src-tauri/gen/apple/build/PlanLyst_iOS.xcarchive/dSYMs

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v6
        with:
          repository: Choochmeque/PlanLyst
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          ref: ${{ github.event.client_payload.tag }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc,aarch64-pc-windows-msvc

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Create .env file
        run: |
          Set-Content -Path "src-tauri/.env" -Value $env:DOT_ENV
          Set-Content -Path ".env" -Value $env:ROOT_DOT_ENV
        env:
          DOT_ENV: ${{ secrets.DOT_ENV }}
          ROOT_DOT_ENV: ${{ secrets.ROOT_DOT_ENV }}

      - name: Build Windows MSIX Bundle (x64 + ARM64)
        env:
          # Emit line-tables DWARF/PDB so .pdb files generated alongside each
          # binary carry symbolication info. PDBs are sidecar files — never
          # bundled into the MSIX delivered to users, so this only affects
          # what Sentry receives, not download size.
          CARGO_PROFILE_RELEASE_DEBUG: line-tables-only
        run: pnpm tauri:windows:build --arch arm64,x64 --verbose

      - name: Configure Microsoft Store CLI
        uses: microsoft/microsoft-store-apppublisher@v1.3

      - name: Reconfigure store credentials
        run: msstore reconfigure `
              --tenantId ${{ secrets.AZURE_AD_TENANT_ID }} `
              --sellerId ${{ secrets.SELLER_ID }} `
              --clientId ${{ secrets.AZURE_AD_APPLICATION_CLIENT_ID }} `
              --clientSecret ${{ secrets.AZURE_AD_APPLICATION_SECRET }}

      # msstore publish dispatches on file extension, so <pathOrUrl> must be
      # the .msixbundle itself, not its directory. The bundle filename embeds
      # the version (e.g. PlanLyst_0.3.6.0.msixbundle), so resolve it via glob.
      - name: Publish to Microsoft Store
        shell: pwsh
        run: |
          $bundle = Get-ChildItem -Path "${{ github.workspace }}/src-tauri/target/msix" -Filter "*.msixbundle" | Select-Object -First 1
          if (-not $bundle) { throw "No .msixbundle found in src-tauri/target/msix" }
          msstore publish $bundle.FullName -id ${{ secrets.MS_STORE_PRODUCT_ID }}

      - name: Install sentry-cli
        shell: pwsh
        run: |
          Invoke-WebRequest `
            -Uri 'https://github.com/getsentry/sentry-cli/releases/latest/download/sentry-cli-Windows-x86_64.exe' `
            -OutFile "$env:USERPROFILE\sentry-cli.exe"
          # Make sentry-cli resolvable on PATH for the next step.
          Add-Content -Path $env:GITHUB_PATH -Value "$env:USERPROFILE"

      - name: Upload Windows PDBs to Sentry
        shell: pwsh
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          sentry-cli debug-files upload --type pdb `
            src-tauri/target/x86_64-pc-windows-msvc/release `
            src-tauri/target/aarch64-pc-windows-msvc/release

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v6
        with:
          repository: Choochmeque/PlanLyst
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          ref: ${{ github.event.client_payload.tag }}

      - name: Select Xcode 26.2
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.2"

      - name: Remove MetalToolchain (Xcode 26 toolchain shadowing fix)
        run: |
          for i in 1 2 3; do
            sudo xcodebuild -downloadComponent MetalToolchain && break
            echo "Attempt $i failed; sleeping 15s and retrying"
            sleep 15
          done || echo "MetalToolchain catalog fetch still failing; continuing in case the asset is already on disk"
          sudo xcodebuild -deleteComponent MetalToolchain

      - name: Import Apple Distribution certificate
        uses: apple-actions/import-codesign-certs@v7
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          keychain-password: ${{ secrets.SIGNING_KEYCHAIN_PASSWORD }}

      - name: Import Mac Installer Distribution certificate
        uses: apple-actions/import-codesign-certs@v7
        with:
          p12-file-base64: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_PASSWORD }}
          keychain-password: ${{ secrets.SIGNING_KEYCHAIN_PASSWORD }}
          create-keychain: false

      - name: Download macOS provisioning profile
        uses: apple-actions/download-provisioning-profiles@v6
        with:
          bundle-id: com.aurelen.planlyst
          profile-type: MAC_APP_STORE
          issuer-id: ${{ secrets.APPLE_API_ISSUER }}
          api-key-id: ${{ secrets.APPLE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPLE_API_PRIVATE_KEY }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Cache Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Create .env file
        run: |
          echo "${{ secrets.DOT_ENV }}" > src-tauri/.env
          echo "${{ secrets.ROOT_DOT_ENV }}" > .env

      - name: Prepare App Store Connect API key
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${{ secrets.APPLE_API_PRIVATE_KEY }}" > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Regenerate macOS Xcode project
        run: pnpm tauri-macos-xcode init --skip-icons

      - name: Archive macOS app
        working-directory: src-tauri/gen/apple-macos
        env:
          # Emit symbolication info into a separate .dSYM (line tables only,
          # enough for stack traces) and strip the symbol table from the
          # shipped binary. Net effect: .dSYM gets uploaded for Sentry/Apple
          # symbolication, users download a slimmer binary than the no-debug
          # baseline (the unstripped symbol table was the bigger weight).
          CARGO_PROFILE_RELEASE_DEBUG: line-tables-only
          CARGO_PROFILE_RELEASE_SPLIT_DEBUGINFO: packed
          CARGO_PROFILE_RELEASE_STRIP: symbols
        run: |
          # Marketing version = major.minor.0 from package.json's full version.
          # e.g. 0.2.46 → 0.2.0. Build number (CFBundleVersion) keeps tracking
          # the full package.json version via project.yml.
          PKG_VERSION=$(node -p "require('../../../package.json').version")
          MARKETING_VERSION="${PKG_VERSION%.*}.0"
          echo "Using MARKETING_VERSION=$MARKETING_VERSION (derived from package.json $PKG_VERSION)"
          # ARCHS/ONLY_ACTIVE_ARCH override `tauri-macos-xcode init`'s
          # regenerated [arm64, x86_64] default. Command-line build settings
          # sit at the top of Xcode's precedence chain, so they win even
          # though init steamrolls the committed project.yml's arm64-only
          # narrowing on every run.
          # TAURI_RUNNER=pnpm routes build.swift through `pnpm tauri build`,
          # which uses @tauri-apps/cli from node_modules instead of requiring
          # a globally-installed cargo-tauri-cli. Only meaningful on the
          # `archive` action — `-exportArchive` doesn't run script phases.
          xcodebuild -project PlanLyst.xcodeproj \
            -scheme PlanLyst_macOS \
            -configuration release \
            -archivePath build/PlanLyst.xcarchive \
            MARKETING_VERSION="$MARKETING_VERSION" \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            TAURI_RUNNER=pnpm \
            archive

      - name: Export macOS pkg for App Store
        working-directory: src-tauri/gen/apple-macos
        run: |
          xcodebuild -exportArchive \
            -archivePath build/PlanLyst.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/export

      - name: Validate pkg
        run: |
          xcrun altool --validate-app -t macos \
            -f src-tauri/gen/apple-macos/build/export/PlanLyst.pkg \
            --apiKey ${{ secrets.APPLE_API_KEY_ID }} \
            --apiIssuer ${{ secrets.APPLE_API_ISSUER }}

      - name: Upload pkg to App Store Connect
        run: |
          xcrun altool --upload-app -t macos \
            -f src-tauri/gen/apple-macos/build/export/PlanLyst.pkg \
            --apiKey ${{ secrets.APPLE_API_KEY_ID }} \
            --apiIssuer ${{ secrets.APPLE_API_ISSUER }}

      - name: Install sentry-cli
        run: curl -sL https://sentry.io/get-cli/ | sh

      - name: Upload macOS dSYMs to Sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        # Narrow to the actual app's per-arch dSYMs. Xcode's archive bundles
        # every Cargo intermediate dSYM (proc-macros, build scripts, etc.)
        # under dSYMs/, but only the PlanLyst-<hash>.dSYM ones are linked
        # into the shipped binary and worth uploading to Sentry.
        run: sentry-cli debug-files upload src-tauri/gen/apple-macos/build/PlanLyst.xcarchive/dSYMs/PlanLyst-*.dSYM

  create-release:
    needs: [build-android, build-ios, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v6
        with:
          repository: Choochmeque/PlanLyst
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          ref: ${{ github.event.client_payload.tag }}
          fetch-depth: 0

      # Strip the `v` from `vX.Y.Z` tags so the release identifier matches
      # what the app reports to Sentry (CFBundleVersion on iOS, otherwise
      # CARGO_PKG_VERSION — both unprefixed).
      - name: Compute release version
        id: release_version
        env:
          TAG: ${{ github.event.client_payload.tag }}
        run: echo "value=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend with sourcemaps
        env:
          GENERATE_SOURCEMAP: "true"
        run: pnpm build

      - name: Create Sentry release (native engine)
        uses: getsentry/action-release@v3
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        with:
          release: ${{ steps.release_version.outputs.value }}
          environment: production

      - name: Create Sentry release (frontend UI)
        uses: getsentry/action-release@v3
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT_FRONTEND }}
        with:
          release: ${{ steps.release_version.outputs.value }}
          environment: production
          sourcemaps: ./dist
