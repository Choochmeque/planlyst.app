name: Checks

on:
  repository_dispatch:
    types: [run-checks]

jobs:
  check-pnpm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v7
        with:
          repository: Choochmeque/PlanLyst
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          ref: ${{ github.event.client_payload.sha }}

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          run_install: false

      - name: Cache Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        run: pnpm audit || true

      - name: Run pnpm check
        run: pnpm run check

  check-cargo:
    runs-on: ubuntu-latest
    steps:
      - uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: true

      - name: Checkout private repo
        uses: actions/checkout@v7
        with:
          repository: Choochmeque/PlanLyst
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          ref: ${{ github.event.client_payload.sha }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - uses: taiki-e/install-action@cargo-deny

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Cache and install APT packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf cmake
          version: "1.0"

      - name: Check formatting
        run: cargo fmt --all --manifest-path src-tauri/Cargo.toml -- --check

      - name: Create .env file
        run: |
          echo "${{ secrets.DOT_ENV }}" > src-tauri/.env

      - name: Run Clippy
        run: cargo clippy --all-targets --manifest-path src-tauri/Cargo.toml -- -D warnings -D clippy::unwrap_used

      - name: Run audit
        working-directory: src-tauri
        run: cargo deny check advisories || true

  check-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v7
        with:
          repository: Choochmeque/PlanLyst
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          ref: ${{ github.event.client_payload.sha }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-linux-android
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Android environment
        run: ./scripts/setup_android_env.sh ${ANDROID_SDK_ROOT}

      - name: Create .env file
        run: echo "${{ secrets.DOT_ENV }}" > src-tauri/.env

      - name: Run Clippy for Android
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --target aarch64-linux-android -- -D warnings -D clippy::unwrap_used

  check-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v7
        with:
          repository: Choochmeque/PlanLyst
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          ref: ${{ github.event.client_payload.sha }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-apple-ios
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Create .env file
        run: echo "${{ secrets.DOT_ENV }}" > src-tauri/.env

      - name: Run Clippy for iOS
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --target aarch64-apple-ios -- -D warnings -D clippy::unwrap_used

  check-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v7
        with:
          repository: Choochmeque/PlanLyst
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          ref: ${{ github.event.client_payload.sha }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-apple-darwin
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Create .env file
        run: echo "${{ secrets.DOT_ENV }}" > src-tauri/.env

      - name: Run Clippy for macOS
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --target aarch64-apple-darwin -- -D warnings -D clippy::unwrap_used

  check-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v7
        with:
          repository: Choochmeque/PlanLyst
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          ref: ${{ github.event.client_payload.sha }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Create .env file
        shell: pwsh
        run: Set-Content -Path "src-tauri/.env" -Value "${{ secrets.DOT_ENV }}"

      - name: Run Clippy for Windows
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings -D clippy::unwrap_used

  report-status:
    runs-on: ubuntu-latest
    needs: [check-pnpm, check-cargo, check-android, check-ios, check-macos, check-windows]
    if: always()
    steps:
      - name: Report status to private repo
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.PRIVATE_REPO_PAT }}
          script: |
            const sha = '${{ github.event.client_payload.sha }}';
            const results = {
              pnpm: '${{ needs.check-pnpm.result }}',
              cargo: '${{ needs.check-cargo.result }}',
              android: '${{ needs.check-android.result }}',
              ios: '${{ needs.check-ios.result }}',
              macos: '${{ needs.check-macos.result }}',
              windows: '${{ needs.check-windows.result }}'
            };

            const failed = Object.entries(results)
              .filter(([_, v]) => v !== 'success')
              .map(([k, v]) => `${k}=${v}`);

            const allPassed = failed.length === 0;
            const state = allPassed ? 'success' : 'failure';
            const description = allPassed
              ? 'All checks passed'
              : `Failed: ${failed.join(', ')}`;

            await github.rest.repos.createCommitStatus({
              owner: 'Choochmeque',
              repo: 'PlanLyst',
              sha: sha,
              state: state,
              context: 'Checks (external)',
              description: description.substring(0, 140),
              target_url: `https://github.com/Choochmeque/planlyst.app/actions/runs/${{ github.run_id }}`
            });
