name: Checks

on:
  repository_dispatch:
    types: [run-checks]

jobs:
  check-pnpm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: Choochmeque/PlanLyst
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          ref: ${{ github.event.client_payload.sha }}

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          run_install: false

      - name: Cache Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Cache and install APT packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf cmake
          version: "1.0"

      - name: Install frontend dependencies
        run: pnpm install

      - name: Create .env file
        run: |
          echo "${{ secrets.DOT_ENV }}" > src-tauri/.env

      - name: Generate TypeScript bindings
        run: pnpm gen:bindings

      - name: Run pnpm audit
        run: pnpm audit || true  # don't fail on audit issues, just warn

      - name: Run pnpm check
        run: pnpm run check

  check-cargo:
    runs-on: ubuntu-latest
    steps:
      - uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: true

      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: Choochmeque/PlanLyst
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          ref: ${{ github.event.client_payload.sha }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - uses: taiki-e/install-action@cargo-deny

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Cache and install APT packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf cmake
          version: "1.0"

      - name: Check formatting
        run: cargo fmt --all --manifest-path src-tauri/Cargo.toml -- --check

      - name: Create .env file
        run: |
          echo "${{ secrets.DOT_ENV }}" > src-tauri/.env

      - name: Run Clippy
        run: cargo clippy --all-targets --manifest-path src-tauri/Cargo.toml -- -D warnings -D clippy::unwrap_used

      - name: Run audit
        working-directory: src-tauri
        run: cargo deny check advisories || true  # don't fail if advisories found, just warn

  report-status:
    runs-on: ubuntu-latest
    needs: [check-pnpm, check-cargo]
    if: always()
    steps:
      - name: Report status to private repo
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PRIVATE_REPO_PAT }}
          script: |
            const sha = '${{ github.event.client_payload.sha }}';
            const checksPnpm = '${{ needs.check-pnpm.result }}';
            const checksCargo = '${{ needs.check-cargo.result }}';

            const allPassed = checksPnpm === 'success' && checksCargo === 'success';
            const state = allPassed ? 'success' : 'failure';
            const description = allPassed
              ? 'All checks passed'
              : `Failed: pnpm=${checksPnpm}, cargo=${checksCargo}`;

            await github.rest.repos.createCommitStatus({
              owner: 'Choochmeque',
              repo: 'PlanLyst',
              sha: sha,
              state: state,
              context: 'Checks (external)',
              description: description,
              target_url: `https://github.com/Choochmeque/planlyst.app/actions/runs/${{ github.run_id }}`
            });
