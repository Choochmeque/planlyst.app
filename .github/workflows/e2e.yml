name: E2E Tests

on:
  workflow_dispatch:
    inputs:
      sha:
        description: 'Private repo commit SHA to test (defaults to main HEAD)'
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: Choochmeque/PlanLyst
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          ref: ${{ github.event.inputs.sha || 'main' }}

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          run_install: false

      - name: Cache Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: rust-${{ runner.os }}-e2e

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Create .env file
        run: echo "${{ secrets.DOT_ENV }}" > src-tauri/.env

      - name: Install tauri-webdriver
        run: cargo install tauri-webdriver --locked

      - name: Build Tauri app
        run: pnpm tauri build --features e2e --bundles app

      - name: Run E2E tests
        run: pnpm e2e:mac

  e2e-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: Choochmeque/PlanLyst
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          ref: ${{ github.event.inputs.sha || 'main' }}

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          run_install: false

      - name: Cache Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: rust-${{ runner.os }}-e2e

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Create .env file
        shell: pwsh
        run: Set-Content -Path "src-tauri/.env" -Value "${{ secrets.DOT_ENV }}"

      - name: Install tauri-webdriver
        run: cargo install tauri-webdriver --locked

      - name: Build Tauri app
        run: pnpm tauri build --features e2e --no-bundle

      - name: Run E2E tests
        shell: bash
        run: pnpm e2e:win

  report-status:
    runs-on: ubuntu-latest
    needs: [e2e-macos, e2e-windows]
    if: always() && github.event.inputs.sha != ''
    steps:
      - name: Report status to private repo
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PRIVATE_REPO_PAT }}
          script: |
            const sha = '${{ github.event.inputs.sha }}';
            const mac = '${{ needs.e2e-macos.result }}';
            const win = '${{ needs.e2e-windows.result }}';

            const allPassed = mac === 'success' && win === 'success';
            const state = allPassed ? 'success' : 'failure';
            const description = allPassed
              ? 'E2E passed on macOS + Windows'
              : `Failed: mac=${mac}, win=${win}`;

            await github.rest.repos.createCommitStatus({
              owner: 'Choochmeque',
              repo: 'PlanLyst',
              sha: sha,
              state: state,
              context: 'E2E (external)',
              description: description,
              target_url: `https://github.com/Choochmeque/planlyst.app/actions/runs/${{ github.run_id }}`
            });
