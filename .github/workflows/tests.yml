name: Tests + Coverage

on:
  repository_dispatch:
    types: [run-tests]

jobs:
  test-pnpm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v6
        with:
          repository: Choochmeque/PlanLyst
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          ref: ${{ github.event.client_payload.sha }}

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          run_install: false

      - name: Cache Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run UI tests with coverage
        if: github.event.client_payload.actor != 'dependabot[bot]'
        run: pnpm test:coverage

      - name: Run UI tests without coverage (dependabot)
        if: github.event.client_payload.actor == 'dependabot[bot]'
        run: pnpm test:run

      - name: Codecov
        if: github.event.client_payload.actor != 'dependabot[bot]'
        uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          verbose: false
          fail_ci_if_error: true
          files: lcov.info
          flags: pnpm

  test-cargo:
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: true

      - name: Checkout private repo
        uses: actions/checkout@v6
        with:
          repository: Choochmeque/PlanLyst
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          ref: ${{ github.event.client_payload.sha }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - uses: taiki-e/install-action@cargo-llvm-cov
        if: github.event.client_payload.actor != 'dependabot[bot]'

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Cache and install APT packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf cmake
          version: "1.0"

      - name: Create .env file
        run: echo "${{ secrets.DOT_ENV }}" > src-tauri/.env

      - name: Run tests with Turso backend
        if: github.event.client_payload.actor != 'dependabot[bot]'
        run: cargo test --workspace --all-targets --manifest-path src-tauri/Cargo.toml --features turso --no-default-features || true

      - name: Run rust tests with coverage
        if: github.event.client_payload.actor != 'dependabot[bot]'
        run: cargo llvm-cov --workspace --all-targets --manifest-path src-tauri/Cargo.toml --lcov --output-path coverage.lcov

      - name: Run rust tests without coverage (dependabot)
        if: github.event.client_payload.actor == 'dependabot[bot]'
        run: cargo test --workspace --all-targets --manifest-path src-tauri/Cargo.toml

      - name: Codecov
        if: github.event.client_payload.actor != 'dependabot[bot]'
        uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          verbose: false
          fail_ci_if_error: true
          files: coverage.lcov
          flags: cargo

  report-status:
    runs-on: ubuntu-latest
    needs: [test-pnpm, test-cargo]
    if: always()
    steps:
      - name: Report status to private repo
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.PRIVATE_REPO_PAT }}
          script: |
            const sha = '${{ github.event.client_payload.sha }}';
            const testPnpm = '${{ needs.test-pnpm.result }}';
            const testCargo = '${{ needs.test-cargo.result }}';

            const allPassed = testPnpm === 'success' && testCargo === 'success';
            const state = allPassed ? 'success' : 'failure';
            const description = allPassed
              ? 'All tests passed'
              : `Failed: pnpm=${testPnpm}, cargo=${testCargo}`;

            await github.rest.repos.createCommitStatus({
              owner: 'Choochmeque',
              repo: 'PlanLyst',
              sha: sha,
              state: state,
              context: 'Tests (external)',
              description: description,
              target_url: `https://github.com/Choochmeque/planlyst.app/actions/runs/${{ github.run_id }}`
            });
